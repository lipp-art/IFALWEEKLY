<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Contact - MyProject</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
        }
        .container {
            width: 80%;
            margin: auto;
            padding: 40px;
        }
        h1 {
            text-align: center;
        }
        form {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
        }
        button {
            background: #38bdf8;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background: #0ea5e9;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Hubungi Kami</h1>

    <form>
        <label>Nama</label>
        <input type="text" placeholder="Masukkan nama">

        <label>Email</label>
        <input type="email" placeholder="Masukkan email">

        <label>Pesan</label>
        <textarea rows="5" placeholder="Tulis pesan..."></textarea>

        <button type="submit">Kirim</button>
    </form>
</div>

</body>
</html>
