<form>
    <table cellspacing="5px">

            <td><label for="nama">Nama</label></td>
            <td>:</td>
            <td><input type="text" name="nama" id="nama"/></td>

        <tr>
            <td><label for="uts">UTS</label></td>
            <td>:</td>
            <td><input type="number" name ="uts" id="uts"></td>
        </tr>
        <tr>
            <td><label for="uas">UAS</label></td>
            <td>:</td>
            <td><input type="number" name ="uas" id="uas"></td>

        <tr>

    <input type="submit" name="submit" value="Simpan Data">

<form>
    <table>
        <tr>
            <td>Nama</td>
            <td><input type="text" name="nama"></td>
        </tr>
        <tr>
            <td>NIM</td>
            <td><input type="number" name="nim"></td>
        </tr>
        <tr>
            <td>Password</td>
            <td><input type="password" name="password"></td>
        </tr>
        <tr>
            <td>Email</td>
            <td><input type="email" name="email"></td>
        </tr>
        <tr>
            <td>No HP</td>
            <td><input type="tel" name="nohp"></td>
        </tr>
        <tr>
            <td>Website Pribadi</td>
            <td><input type="url" name="website"></td>
        </tr>
        <tr>
            <td>Tanggal Lahir</td>
            <td><input type="date" name="tgl_lahir"></td>
        </tr>
        <tr>
            <td>Warna Favorit</td>
            <td><input type="color" name="warna"></td>
        </tr>
        <tr>
            <td>Tingkat Kepuasan</td>
            <td><input type="range" name="kepuasan" min="1" max="10"></td>
        </tr>
        <tr>
            <td>Jenis Kelamin</td>
            <td>
                <input type="radio" name="jk" value="Laki-laki"> Laki-laki
                <input type="radio" name="jk" value="Perempuan"> Perempuan
            </td>
        </tr>
        <tr>
            <td>Hobi</td>
            <td>
                <input type="checkbox" name="hobi" value="Membaca"> Membaca<br>
                <input type="checkbox" name="hobi" value="Olahraga"> Olahraga<br>
                <input type="checkbox" name="hobi" value="Mengaji"> Mengaji
            </td>
        </tr>
        <tr>
            <td>Upload Foto</td>
            <td><input type="file" name="foto"></td>
        </tr>
        <tr>
            <td>Alamat</td>
            <td><textarea name="alamat" rows="4" cols="30"></textarea></td>
        </tr>
        <tr>
            <td>Jurusan</td>
            <td>
                <select name="jurusan">
                    <option value="">-- Pilih Jurusan --</option>
                    <option value="Informatika">Informatika</option>
                    <option value="Sistem Informasi">Sistem Informasi</option>
                    <option value="Teknik Komputer">Teknik Komputer</option>
                    <option value="Teknik Elektro">Teknik Elektro</option>
                    <option value="Teknik Mesin">Teknik Mesin</option>
                    <option value="Teknik Industri">Teknik Industri</option>
                    <option value="Teknik Lingkungan">Teknik Lingkungan</option>
                    <option value="Teknik Sipil">Teknik Sipil</option>
                    <option value="Teknik Perkapalan">Teknik Perkapalan</option>
                </select>
            </td>
        </tr>
        <tr>
            <td>
                <input type="submit" value="Submit">
            </td>
        </tr>
    </table>
</form>
